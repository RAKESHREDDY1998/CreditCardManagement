# ===== Server Configuration =====
server.port=8080

# ===== H2 In-Memory Database =====
spring.datasource.url=jdbc:h2:mem:creditcarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== JWT Configuration =====
app.jwt.secret=creditCardManagementSecretKey2026XYZABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnop
app.jwt.expiration=86400000

# ===== Quartz Scheduler =====
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.auto-startup=true

# ===== Logging =====
logging.level.com.creditcard=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.quartz=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
